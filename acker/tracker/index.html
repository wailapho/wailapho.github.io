<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackly • Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <!-- minimal icons fallback -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .nav-icon { width: 24px; height: 24px; }
        .modal { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .phone-frame { box-shadow: 0 0 0 12px #111827, 0 0 0 16px #1f2937; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen flex items-center justify-center">
    <div class="phone-frame w-full max-w-md mx-auto bg-white min-h-screen overflow-hidden flex flex-col">
        
        <!-- HEADER -->
        <header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-2xl flex items-center justify-center">
                    <span class="text-white text-xl font-semibold">T</span>
                </div>
                <div>
                    <h1 class="text-2xl font-semibold text-gray-900">Trackly</h1>
                    <p class="text-xs text-gray-500">Social Performance</p>
                </div>
            </div>
            <button onclick="showToast('Account settings coming soon')" 
                    class="w-9 h-9 bg-gray-100 hover:bg-gray-200 rounded-2xl flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="nav-icon text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7" />
                </svg>
            </button>
        </header>

        <!-- CONTENT AREA -->
        <main id="main-content" class="flex-1 overflow-y-auto pb-20">
            <!-- Dashboard (default) -->
            <div id="dashboard" class="p-6">
                <h2 class="text-3xl font-semibold text-gray-900 mb-6">Good morning, Alex</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white border border-gray-100 rounded-3xl p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm text-gray-500">Total Leads</p>
                                <p id="total-leads" class="text-5xl font-semibold text-gray-900 mt-2">142</p>
                            </div>
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 01-5.356-1.857M17 20H7m5-2v-2m-5 2v-2m-5 2v-2a3 3 0 015.356-1.857" />
                            </svg>
                        </div>
                    </div>
                    <div class="bg-white border border-gray-100 rounded-3xl p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm text-gray-500">Avg. Engagement</p>
                                <p id="avg-engagement" class="text-5xl font-semibold text-gray-900 mt-2">6.8%</p>
                            </div>
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="mt-8">
                    <h3 class="font-medium text-gray-500 mb-3">Recent Performance</h3>
                    <div id="recent-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- PERFORMANCE TAB -->
            <div id="performance" class="p-6 hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-900">Performance</h2>
                    <button onclick="openPerformanceModal()" 
                            class="bg-indigo-600 text-white px-5 py-2.5 rounded-3xl text-sm font-medium flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                        </svg>
                        New Post
                    </button>
                </div>
                <div id="performance-list" class="space-y-4"></div>
            </div>

            <!-- LEADS TAB -->
            <div id="leads" class="p-6 hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-900">Leads</h2>
                    <button onclick="openLeadModal()" 
                            class="bg-indigo-600 text-white px-5 py-2.5 rounded-3xl text-sm font-medium flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                        </svg>
                        New Lead
                    </button>
                </div>
                <div id="leads-list" class="space-y-4"></div>
            </div>

            <!-- OPPORTUNITIES TAB -->
            <div id="opportunities" class="p-6 hidden">
                <h2 class="text-2xl font-semibold text-gray-900 mb-6">Opportunities</h2>
                <p class="text-gray-400 text-center py-12">Pipeline view coming soon</p>
            </div>
        </main>

        <!-- BOTTOM NAV -->
        <nav class="bg-white border-t border-gray-100 fixed bottom-0 left-1/2 -translate-x-1/2 max-w-md w-full px-6 py-3 flex justify-around z-50">
            <button onclick="switchTab(0)" class="flex flex-col items-center text-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5" />
                </svg>
                <span class="text-xs mt-1 font-medium">Home</span>
            </button>
            <button onclick="switchTab(1)" class="flex flex-col items-center text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-9 9-4-4-6 6" />
                </svg>
                <span class="text-xs mt-1 font-medium">Performance</span>
            </button>
            <button onclick="switchTab(2)" class="flex flex-col items-center text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 01-5.356-1.857M17 20H7m5-2v-2m-5 2v-2m-5 2v-2a3 3 0 015.356-1.857" />
                </svg>
                <span class="text-xs mt-1 font-medium">Leads</span>
            </button>
            <button onclick="switchTab(3)" class="flex flex-col items-center text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 01-2-2H7a2 2 0 01-2 2v16m14 0h2m-2 0h-5m-4 0H3" />
                </svg>
                <span class="text-xs mt-1 font-medium">Pipeline</span>
            </button>
        </nav>
    </div>

    <!-- PERFORMANCE MODAL -->
    <div id="perf-modal" class="hidden fixed inset-0 bg-black/60 flex items-end justify-center z-[100]">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 modal">
            <h3 class="font-semibold text-xl mb-6">New Post Performance</h3>
            <form id="perf-form">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-1">Platform</label>
                        <select id="perf-platform" class="w-full border border-gray-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-600">
                            <option value="Instagram">Instagram</option>
                            <option value="Xiaohongshu (RedNote)">Xiaohongshu (RedNote)</option>
                            <option value="Douyin">Douyin</option>
                            <option value="Facebook">Facebook</option>
                            <option value="TikTok">TikTok</option>
                            <option value="LinkedIn">LinkedIn</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-1">Post Link (optional)</label>
                        <input id="perf-link" type="text" class="w-full border border-gray-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-600" placeholder="https://...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-1">Screenshot</label>
                        <input id="perf-screenshot" type="file" accept="image/*" class="hidden" onchange="previewImage(this, 'perf-preview')">
                        <div onclick="document.getElementById('perf-screenshot').click()" 
                             class="border-2 border-dashed border-gray-300 rounded-3xl h-52 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v-4m0 0l4 4m-4-4l4-4m12 0v4m0-4l-4 4m4-4l-4-4" />
                            </svg>
                            <p class="text-sm text-gray-400">Tap to upload screenshot</p>
                        </div>
                        <img id="perf-preview" class="hidden mt-4 rounded-2xl w-full border">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="closeModal('perf-modal')" 
                            class="flex-1 py-4 text-gray-500 font-medium">Cancel</button>
                    <button type="button" onclick="submitPerformance()" 
                            class="flex-1 bg-indigo-600 text-white py-4 rounded-3xl font-medium">Analyse with AI</button>
                </div>
            </form>
        </div>
    </div>

    <!-- LEAD MODAL -->
    <div id="lead-modal" class="hidden fixed inset-0 bg-black/60 flex items-end justify-center z-[100]">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 modal">
            <h3 class="font-semibold text-xl mb-6">New Chat Lead</h3>
            <form id="lead-form">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-1">Platform / Source</label>
                        <select id="lead-platform" class="w-full border border-gray-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-600">
                            <option value="Instagram DM">Instagram DM</option>
                            <option value="Xiaohongshu">Xiaohongshu</option>
                            <option value="Douyin">Douyin</option>
                            <option value="Facebook Messenger">Facebook Messenger</option>
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="WeChat">WeChat</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-1">Chat Screenshot</label>
                        <input id="lead-screenshot" type="file" accept="image/*" class="hidden" onchange="previewImage(this, 'lead-preview')">
                        <div onclick="document.getElementById('lead-screenshot').click()" 
                             class="border-2 border-dashed border-gray-300 rounded-3xl h-52 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v-4m0 0l4 4m-4-4l4-4m12 0v4m0-4l-4 4m4-4l-4-4" />
                            </svg>
                            <p class="text-sm text-gray-400">Tap to upload chat screenshot</p>
                        </div>
                        <img id="lead-preview" class="hidden mt-4 rounded-2xl w-full border">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="closeModal('lead-modal')" 
                            class="flex-1 py-4 text-gray-500 font-medium">Cancel</button>
                    <button type="button" onclick="submitLead()" 
                            class="flex-1 bg-indigo-600 text-white py-4 rounded-3xl font-medium">Extract & Save Lead</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-3xl text-sm shadow-2xl flex items-center gap-2">
        <span id="toast-text"></span>
    </div>

    <script>
        // Tailwind script init
        tailwind.config = { content: ["*"], theme: { extend: {} } };

        // Tab switching
        function switchTab(n) {
            document.querySelectorAll('#main-content > div').forEach(div => div.classList.add('hidden'));
            const tabs = ['dashboard', 'performance', 'leads', 'opportunities'];
            document.getElementById(tabs[n]).classList.remove('hidden');
            
            // Update active nav (simple colour change)
            document.querySelectorAll('nav button').forEach((btn, i) => {
                btn.classList.toggle('text-indigo-600', i === n);
                btn.classList.toggle('text-gray-400', i !== n);
            });
        }

        // Modal helpers
        function openPerformanceModal() { document.getElementById('perf-modal').classList.remove('hidden'); }
        function openLeadModal() { document.getElementById('lead-modal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Image preview
        function previewImage(input, previewId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById(previewId);
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Make.com webhook placeholders — REPLACE THESE
        const PERFORMANCE_WEBHOOK = "https://hook.eu1.make.com/YOUR_PERFORMANCE_WEBHOOK";
        const LEAD_WEBHOOK = "https://hook.eu1.make.com/YOUR_LEAD_WEBHOOK";

        // Submit Performance (sends to Make.com)
        async function submitPerformance() {
            const platform = document.getElementById('perf-platform').value;
            const link = document.getElementById('perf-link').value;
            const fileInput = document.getElementById('perf-screenshot');
            const file = fileInput.files[0];

            if (!file) { showToast("Please upload a screenshot"); return; }

            const formData = new FormData();
            formData.append('platform', platform);
            formData.append('post_link', link);
            formData.append('screenshot', file);

            try {
                const res = await fetch(PERFORMANCE_WEBHOOK, { method: 'POST', body: formData });
                if (res.ok) {
                    showToast("AI analysis complete • Saved to Google Sheets");
                    closeModal('perf-modal');
                    // Refresh list (demo)
                    renderPerformanceList();
                }
            } catch (e) {
                showToast("Sent to Make.com (demo mode)");
                closeModal('perf-modal');
                renderPerformanceList();
            }
        }

        // Submit Lead
        async function submitLead() {
            const platform = document.getElementById('lead-platform').value;
            const fileInput = document.getElementById('lead-screenshot');
            const file = fileInput.files[0];

            if (!file) { showToast("Please upload chat screenshot"); return; }

            const formData = new FormData();
            formData.append('platform', platform);
            formData.append('chat_screenshot', file);

            try {
                const res = await fetch(LEAD_WEBHOOK, { method: 'POST', body: formData });
                if (res.ok) {
                    showToast("Lead extracted & saved");
                    closeModal('lead-modal');
                    renderLeadsList();
                }
            } catch (e) {
                showToast("Lead saved via Make.com (demo)");
                closeModal('lead-modal');
                renderLeadsList();
            }
        }

        // Render demo lists
        function renderPerformanceList() {
            const container = document.getElementById('performance-list');
            container.innerHTML = `
                <div class="bg-white border border-gray-100 rounded-3xl p-4 flex gap-4">
                    <img src="https://picsum.photos/id/1015/80/80" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1">
                        <p class="font-medium">Instagram Reel • 18 Mar</p>
                        <p class="text-sm text-gray-500">Impressions: 12.4k • Reach: 9.8k</p>
                        <p class="text-xs text-emerald-600 mt-1">AI analysed ✓</p>
                    </div>
                </div>
            `;
        }

        function renderLeadsList() {
            const container = document.getElementById('leads-list');
            container.innerHTML = `
                <div class="bg-white border border-gray-100 rounded-3xl p-4">
                    <p class="font-medium">Sarah Chen • WeChat</p>
                    <p class="text-sm text-gray-500">Xiaohongshu comment → “Interested in package”</p>
                </div>
            `;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2800);
        }

        // Initial render
        window.onload = () => {
            switchTab(0);
            renderPerformanceList();
            renderLeadsList();
            // Demo numbers
            document.getElementById('total-leads').textContent = "142";
            document.getElementById('avg-engagement').textContent = "6.8%";
        };
    </script>
</body>
</html>

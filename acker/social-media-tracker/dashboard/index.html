<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Acker — Performance Dashboard</title>
  <link rel="icon" href="https://wailapho.github.io/acker/img/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg:        #0f0d0d;
      --burg:      #801747;
      --gold:      #BEAD85;
      --grey:      #F2F2F2;
      --glass:     rgba(255,255,255,0.042);
      --glass2:    rgba(255,255,255,0.07);
      --gb:        rgba(255,255,255,0.09);
      --ghi:       rgba(255,255,255,0.11);
      --text:      #F2F2F2;
      --sub:       rgba(242,242,242,0.55);
      --muted:     rgba(242,242,242,0.28);
      --burg-dim:  rgba(128,23,71,0.16);
      --gold-dim:  rgba(190,173,133,0.14);
      --burg-glow: rgba(128,23,71,0.35);
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html { height:100%; overflow-x:hidden; }
    body {
      font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
      min-height:100dvh; -webkit-font-smoothing:antialiased; overflow-x:hidden;
    }
    .orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .orb  { position:absolute; border-radius:50%; filter:blur(100px); }
    .o1   { width:500px;height:500px;top:-180px;right:-160px;background:radial-gradient(circle at 40% 40%,rgba(128,23,71,0.45),transparent 70%); }
    .o2   { width:400px;height:400px;bottom:0;left:-100px;background:radial-gradient(circle at 60% 60%,rgba(190,173,133,0.32),transparent 70%); }
    .o3   { width:220px;height:220px;top:55%;left:55%;background:radial-gradient(circle,rgba(128,23,71,0.12),transparent 70%); }

    .page { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:0 24px 60px; }

    /* NAV */
    .topnav {
      display:flex; align-items:center; justify-content:space-between;
      padding:24px 0 28px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:28px;
    }
    .nav-brand { display:flex; align-items:center; gap:12px; }
    .nav-icon  { width:36px;height:36px;border-radius:50%;background:var(--glass2);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;overflow:hidden; }
    .nav-icon img { width:22px;height:22px;object-fit:contain; }
    .nav-title { font-family:'Instrument Serif',serif; font-size:18px; font-weight:400; color:var(--text); letter-spacing:-0.2px; }
    .nav-title em { font-style:italic; color:var(--gold); }
    .nav-right { display:flex; align-items:center; gap:10px; }
    .refresh-btn {
      display:flex;align-items:center;gap:6px;
      background:var(--glass);border:1px solid var(--gb);color:var(--sub);
      border-radius:10px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;
    }
    .refresh-btn:hover { color:var(--text); }
    .refresh-btn.spinning i { animation:spin 1s linear infinite; }
    .last-updated { font-size:12px; color:var(--muted); }

    /* PLATFORM TABS */
    .platform-tabs { display:flex; gap:6px; margin-bottom:24px; flex-wrap:wrap; }
    .ptab {
      display:flex;align-items:center;gap:8px;padding:10px 18px;
      background:var(--glass);border:1px solid var(--gb);border-radius:12px;
      cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;
      color:var(--muted);transition:color 0.1s,border-color 0.1s,background 0.1s;
      white-space:nowrap;
    }
    .ptab:hover { color:var(--sub); }
    .ptab i { font-size:14px; }
    .ptab.act-xhs { background:var(--burg-dim);border-color:rgba(128,23,71,0.45);color:#d47099; }
    .ptab.act-ig  { background:rgba(228,64,95,0.1);border-color:rgba(228,64,95,0.38);color:#e4405f; }
    .ptab.tbc     { opacity:0.38; cursor:default; pointer-events:none; }
    .tbc-badge    { font-size:10px;background:rgba(255,255,255,0.08);border-radius:4px;padding:1px 5px;color:var(--muted); }

    /* STATS */
    .stats-row { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px; }
    .stat-card {
      background:var(--glass);border:1px solid var(--gb);border-radius:16px;padding:18px 20px;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:inset 0 1px 0 var(--ghi);
      animation:fadeUp .4s ease both;
    }
    .stat-label { font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:8px; }
    .stat-value { font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;color:var(--text);line-height:1; }
    .stat-value.gold { color:var(--gold); }
    .stat-value.burg { color:#c45a82; }
    .stat-sub { font-size:11px;color:var(--muted);margin-top:4px; }

    /* TABLE */
    .table-card {
      background:var(--glass);border:1px solid var(--gb);border-radius:20px;overflow:hidden;
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      box-shadow:inset 0 1px 0 var(--ghi),0 8px 40px rgba(0,0,0,0.3);
      animation:fadeUp .4s .1s ease both;
    }
    .table-header { display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,0.06); }
    .table-title  { font-size:14px;font-weight:600;color:var(--text); }
    .table-count  { font-size:12px;color:var(--muted);background:rgba(255,255,255,0.05);border:1px solid var(--gb);border-radius:100px;padding:2px 10px; }
    /* ── Scroll track sits above the table ── */
    .scroll-track {
      overflow-x: auto;
      overflow-y: hidden;
      /* give it enough height to show the scrollbar thumb */
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .scroll-track-inner { height: 1px; display: block; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Brand-styled scrollbar — on the TOP track */
    .scroll-track::-webkit-scrollbar         { height: 6px; }
    .scroll-track::-webkit-scrollbar-track   { background: rgba(255,255,255,0.04); border-radius: 3px; }
    .scroll-track::-webkit-scrollbar-thumb   { background: linear-gradient(90deg, var(--burg), var(--gold)); border-radius: 3px; }
    .scroll-track::-webkit-scrollbar-thumb:hover { background: linear-gradient(90deg, #a01d5a, #d4c99a); }
    .scroll-track { scrollbar-width: thin; scrollbar-color: var(--burg) rgba(255,255,255,0.04); }

    /* Hide the bottom scrollbar on the actual table */
    .table-wrap::-webkit-scrollbar { display: none; }
    .table-wrap { scrollbar-width: none; }

    table { width:100%;border-collapse:collapse;font-size:13px;min-width:900px; }
    thead th {
      padding:11px 14px;text-align:left;font-size:10px;font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
      border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap;
      background:rgba(0,0,0,0.15);cursor:pointer;user-select:none;
    }
    thead th:hover { color:var(--sub); }
    thead th.sorted { color:var(--gold); }
    .sort-icon { margin-left:3px;opacity:.4;font-size:9px; }
    thead th.sorted .sort-icon { opacity:1; }
    tbody tr { border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer; }
    tbody tr:hover { background:rgba(255,255,255,0.035); }
    tbody tr:last-child { border-bottom:none; }
    tbody td { padding:11px 14px;color:var(--sub);vertical-align:middle; }
    .td-title { font-weight:500;color:var(--text);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .td-date  { white-space:nowrap;font-size:12px; }
    .td-num   { font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap; }
    .td-hi    { color:var(--gold);font-weight:500; }
    .td-pct   { font-size:12px; }
    .thumb-cell { width:44px;height:44px;border-radius:8px;object-fit:cover;display:block;border:1px solid var(--gb);background:rgba(255,255,255,0.04); }
    .no-thumb   { width:44px;height:44px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px; }
    .snip       { max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11.5px;color:var(--muted); }

    /* STATE */
    .state-box { padding:60px 20px;text-align:center;color:var(--muted);font-size:14px; }
    .state-box i { font-size:26px;margin-bottom:10px;display:block; }

    /* DRAWER */
    .overlay { position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s; }
    .overlay.open { opacity:1;pointer-events:all; }
    .drawer {
      position:fixed;top:0;right:0;bottom:0;width:min(520px,100vw);
      background:rgba(16,13,13,0.98);border-left:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
      z-index:201;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;overflow:hidden;
    }
    .drawer.open { transform:translateX(0); }
    .drawer-top {
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;
    }
    .d-ptag { display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted); }
    .d-close {
      width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid var(--gb);
      display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);font-size:13px;
    }
    .d-close:hover { background:rgba(255,255,255,0.1);color:var(--text); }
    .drawer-body { flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch; }

    .d-post-title { font-family:'Instrument Serif',serif;font-size:20px;font-weight:400;color:var(--text);line-height:1.35;margin-bottom:16px; }

    .d-img-wrap { border-radius:14px;overflow:hidden;background:rgba(255,255,255,0.03);border:1px solid var(--gb);margin-bottom:18px;position:relative;min-height:80px; }
    .d-img      { width:100%;display:block;object-fit:contain;max-height:340px; }
    .d-img-loading { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;gap:8px; }
    .d-img-loading i { animation:spin 1s linear infinite; }
    .d-img-err  { padding:28px;text-align:center;color:var(--muted);font-size:13px; }
    .d-img-err i { font-size:22px;margin-bottom:8px;display:block; }
    .d-link     { display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--gold);text-decoration:none; }
    .d-link:hover { text-decoration:underline; }

    .metrics-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px; }
    .mp { background:rgba(255,255,255,0.04);border:1px solid var(--gb);border-radius:10px;padding:12px 14px; }
    .mp-label { font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px; }
    .mp-val   { font-family:'Instrument Serif',serif;font-size:22px;color:var(--text); }
    .mp-val.gold { color:var(--gold); }

    .overall-box { background:rgba(128,23,71,0.08);border:1px solid rgba(128,23,71,0.2);border-radius:14px;padding:16px; }
    .overall-heading { font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#c45a82;margin-bottom:10px;display:flex;align-items:center;gap:6px; }
    .overall-text { font-size:13.5px;color:var(--sub);line-height:1.65;white-space:pre-wrap; }

    /* SETUP BANNER */
    .setup-banner {
      background:rgba(190,173,133,0.08);border:1px solid rgba(190,173,133,0.22);
      border-radius:14px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:var(--sub);line-height:1.7;
    }
    .setup-banner strong { color:var(--gold); }
    code { background:rgba(255,255,255,0.07);border-radius:4px;padding:1px 6px;font-family:monospace;font-size:12px;color:var(--grey); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin   { to{transform:rotate(360deg)} }

    @media(max-width:640px){
      .page{padding:0 14px 40px}
      .topnav{padding:16px 0 18px;margin-bottom:18px}
      .stats-row{grid-template-columns:1fr 1fr}
      .stat-value{font-size:22px}
      .drawer{width:100vw}
    }
  </style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<div class="page">

  <nav class="topnav">
    <div class="nav-brand">
      <div class="nav-icon"><img src="https://wailapho.github.io/acker/img/favicon.ico" alt=""></div>
      <div class="nav-title">Acker <em>Performance</em> Dashboard</div>
    </div>
    <div class="nav-right">
      <span class="last-updated" id="lastUpdated">—</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
        <i class="fas fa-rotate-right"></i> Refresh
      </button>
    </div>
  </nav>



  <div class="platform-tabs">
    <button class="ptab" id="tab-xhs" onclick="switchPlatform('xhs')">
      <i class="fas fa-bookmark" style="color:#ff3c50"></i> 小红书 Rednote
    </button>
    <button class="ptab" id="tab-ig" onclick="switchPlatform('ig')">
      <i class="fab fa-instagram" style="color:#e4405f"></i> Instagram
    </button>
    <button class="ptab tbc"><i class="fab fa-facebook-f" style="color:#1877f2"></i> Facebook<span class="tbc-badge">TBC</span></button>
    <button class="ptab tbc"><i class="fab fa-tiktok"></i> Douyin<span class="tbc-badge">TBC</span></button>
    <button class="ptab tbc"><i class="fas fa-ellipsis"></i> Other<span class="tbc-badge">TBC</span></button>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">Total Posts</div><div class="stat-value" id="s-posts">—</div><div class="stat-sub">tracked</div></div>
    <div class="stat-card"><div class="stat-label">Total Impressions</div><div class="stat-value gold" id="s-impr">—</div><div class="stat-sub">all posts</div></div>
    <div class="stat-card"><div class="stat-label">Total Likes</div><div class="stat-value burg" id="s-likes">—</div><div class="stat-sub">engagements</div></div>
    <div class="stat-card"><div class="stat-label" id="s-label4">Avg Watch</div><div class="stat-value" id="s-metric4">—</div><div class="stat-sub" id="s-sub4">seconds</div></div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <span class="table-title" id="tableTitle">Posts</span>
      <span class="table-count" id="tableCount">— posts</span>
    </div>
    <div class="scroll-track" id="scrollTrack"><span class="scroll-track-inner" id="scrollTrackInner"></span></div>
    <div class="table-wrap" id="tableWrap">
      <div class="state-box"><i class="fas fa-circle-notch" style="animation:spin 1.2s linear infinite"></i>Loading…</div>
    </div>
  </div><!-- /table-card -->

</div><!-- /page -->

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-top">
    <div class="d-ptag" id="drawerTag"></div>
    <div class="d-close" onclick="closeDrawer()"><i class="fas fa-xmark"></i></div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONFIGURATION
   Fill in the gid for each Google Sheet tab.
   Find it: open sheet → click tab → URL shows gid=XXXXXXX
   ═══════════════════════════════════════════════ */
const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCDqW1D_7yP0eP3M9l0_tlfuspKeuHBHMWXfUPX0PGJtSLMQ42oKGBZQyTW7CPj6s4AghLS3HYn7b4/pub';

const SHEET_GIDS = {
  ig:  0,            // Instagram tab
  xhs: 1293904964,   // Xiaohongshu tab
};

/* ═══════════════════════════════════════════════
   EXACT COLUMN DEFINITIONS
   (matches your Google Sheet headers precisely)
   ═══════════════════════════════════════════════ */
const COLS = {
  // Instagram — exact headers from sheet
  ig: [
    { key:'post_title',                label:'Post Title',          type:'title'    },
    { key:'post_date',                 label:'Post Date',           type:'date'     },
    { key:'reach',                     label:'Reach',               type:'num'      },
    { key:'Impressions',               label:'Impressions',         type:'num-hi'   },
    { key:'Likes',                     label:'Likes',               type:'num'      },
    { key:'Comments',                  label:'Comments',            type:'num'      },
    { key:'Saves',                     label:'Saves',               type:'num'      },
    { key:'Shares',                    label:'Shares',              type:'num'      },
    { key:'profile_visits',            label:'Profile Visits',      type:'num'      },
    { key:'followers_reached_pct',     label:'Followers %',         type:'pct-dec'  },
    { key:'non_followers_reached_pct', label:'Non-Followers %',     type:'pct-dec'  },
    { key:'engagement_rate',           label:'Engagement Rate',     type:'pct-dec'  },
    { key:'Overall',                    label:'Overview',            type:'snip'     },
  ],
  // Xiaohongshu — exact headers from sheet
  xhs: [
    { key:'post_title',              label:'Post Title',            type:'title'    },
    { key:'impressions',             label:'Impressions',           type:'num-hi'   },
    { key:'views',                   label:'Views',                 type:'num'      },
    { key:'likes',                   label:'Likes',                 type:'num'      },
    { key:'comments',                label:'Comments',              type:'num'      },
    { key:'saves',                   label:'Saves',                 type:'num'      },
    { key:'shares',                  label:'Shares',                type:'num'      },
    { key:'cover_click_rate',        label:'Cover Click %',         type:'pct-raw'  },
    { key:'avg_watch_time_seconds',  label:'Avg Watch (s)',         type:'num'      },
    { key:'new_followers',           label:'New Followers',         type:'num'      },
    { key:'Overall',                  label:'Overview',             type:'snip'     },
  ],
};

const STAT_CONFIG = {
  ig: {
    impr:   { key:'Impressions' },
    likes:  { key:'Likes' },
    metric4:{ key:'engagement_rate', label:'Avg Engagement', sub:'rate',
               format: v => v > 0 ? (v * 100).toFixed(2)+'%' : '—' },
  },
  xhs: {
    impr:   { key:'impressions' },
    likes:  { key:'likes' },
    metric4:{ key:'avg_watch_time_seconds', label:'Avg Watch Time', sub:'seconds',
               format: v => v > 0 ? parseFloat(v).toFixed(1)+'s' : '—' },
  },
};

const PLATFORM_META = {
  ig:  { label:'Instagram',      icon:'fab fa-instagram', color:'#e4405f', tabCls:'act-ig'  },
  xhs: { label:'小红书 Rednote', icon:'fas fa-bookmark',  color:'#ff3c50', tabCls:'act-xhs' },
};

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
let current   = 'xhs';
let data      = { ig:[], xhs:[] };
let sortKey   = null;
let sortAsc   = false;

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {

  switchPlatform('xhs');
  loadAll();  // renders after data loads
  setInterval(loadAll, 5 * 60 * 1000);
});

/* ═══════════════════════════════════════════════
   LOAD
   ═══════════════════════════════════════════════ */
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await Promise.all(['ig','xhs'].map(loadSheet));
  btn.classList.remove('spinning');
  document.getElementById('lastUpdated').textContent =
    'Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  renderCurrent();
}

function csvUrl(platform) {
  const gid = SHEET_GIDS[platform];
  if (gid !== null && gid !== undefined) {
    return `${BASE_URL}?gid=${gid}&single=true&output=csv`;
  }
  // Fallback: no gid = load default sheet (may not be right tab)
  return `${BASE_URL}?output=csv`;
}

function loadSheet(platform) {
  return new Promise(resolve => {
    Papa.parse(csvUrl(platform), {
      download: true, header: true, skipEmptyLines: true,
      complete: res => { data[platform] = res.data || []; resolve(); },
      error:    ()  => { resolve(); },
    });
  });
}

/* ═══════════════════════════════════════════════
   SWITCH PLATFORM
   ═══════════════════════════════════════════════ */
function switchPlatform(p) {
  current = p;
  // Auto-sort by impressions desc for XHS, else reset
  if (p === 'xhs') { sortKey = 'impressions'; sortAsc = false; }
  else if (p === 'ig') { sortKey = 'Impressions'; sortAsc = false; }
  else { sortKey = null; sortAsc = false; }
  Object.keys(PLATFORM_META).forEach(k => {
    const btn = document.getElementById('tab-'+k);
    btn.className = 'ptab' + (k===p ? ' '+PLATFORM_META[k].tabCls : '');
  });
  renderCurrent();
}

/* ═══════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════ */
function renderCurrent() {
  renderStats(current, data[current]);
  renderTable(current, data[current]);
}

function renderStats(p, rows) {
  const cfg = STAT_CONFIG[p];
  const n   = rows.length;
  document.getElementById('s-posts').textContent  = n;
  document.getElementById('s-impr').textContent   = fmt(sumCol(rows, cfg.impr.key));
  document.getElementById('s-likes').textContent  = fmt(sumCol(rows, cfg.likes.key));

  const m4 = cfg.metric4;
  document.getElementById('s-label4').textContent  = m4.label;
  document.getElementById('s-sub4').textContent    = m4.sub;
  const avgVal = avgCol(rows, m4.key);
  document.getElementById('s-metric4').textContent = avgVal > 0 ? m4.format(avgVal) : '—';
}

function renderTable(p, rawRows) {
  const wrap  = document.getElementById('tableWrap');
  const title = document.getElementById('tableTitle');
  const count = document.getElementById('tableCount');
  const meta  = PLATFORM_META[p];
  const cols  = COLS[p];

  title.textContent = meta.label + ' Posts';

  if (!rawRows || rawRows.length === 0) {
    const gid = SHEET_GIDS[p];
    const msg = gid === null
      ? `No GID set for ${meta.label}. Add the gid to SHEET_GIDS in the script.`
      : `No data yet. Make sure the sheet tab is published.`;
    wrap.innerHTML = `<div class="state-box"><i class="fas fa-table"></i>${msg}</div>`;
    count.textContent = '0 posts';
    return;
  }

  // Sort
  let rows = [...rawRows];
  if (sortKey) {
    rows.sort((a, b) => {
      const av = parseFloat(a[sortKey]) || a[sortKey] || '';
      const bv = parseFloat(b[sortKey]) || b[sortKey] || '';
      if (av < bv) return sortAsc ?  1 : -1;
      if (av > bv) return sortAsc ? -1 :  1;
      return 0;
    });
  }

  count.textContent = rows.length + ' post' + (rows.length !== 1 ? 's' : '');

  // Header
  let html = '<table><thead><tr>';
  html += '<th style="width:50px">Image</th>';
  html += '<th>Upload Date</th>';
  cols.forEach(c => {
    const sorted = sortKey === c.key;
    const arrow  = sorted ? (sortAsc ? 'fa-arrow-up':'fa-arrow-down') : 'fa-sort';
    html += `<th class="${sorted?'sorted':''}" onclick="doSort('${c.key}')">
               ${c.label} <i class="fas ${arrow} sort-icon"></i></th>`;
  });
  html += '</tr></thead><tbody>';

  // Rows
  rows.forEach((row, idx) => {
    const imgThumb = driveThumb(row['upload-img'] || '');
    const snip     = (row['Overall'] || '').substring(0, 90);

    html += `<tr onclick="openDrawer(${rawRows.indexOf(row)}, '${p}')">`;

    // Thumbnail
    html += '<td>';
    if (imgThumb) {
      html += `<img class="thumb-cell" src="${imgThumb}" alt="" loading="lazy"
                 onerror="this.style.display='none';this.nextSibling.style.display='flex'">
               <div class="no-thumb" style="display:none"><i class="fas fa-image"></i></div>`;
    } else {
      html += `<div class="no-thumb"><i class="fas fa-image"></i></div>`;
    }
    html += '</td>';

    // Upload Date in fixed column
    const uploadDate = row['upload-date'] || '—';
    html += `<td class="td-date" style="white-space:nowrap;font-size:12px">${esc(uploadDate)}</td>`;

    // Data columns
    cols.forEach(c => {
      let val  = row[c.key] ?? '—';
      let cls  = 'td-num';
      if (c.type === 'title')  { cls = 'td-title'; }
      else if (c.type === 'date') { cls = 'td-date'; }
      else if (c.type === 'num-hi') { cls = 'td-num td-hi'; }
      else if (c.type === 'snip') {
        cls = '';
        val = String(val).substring(0, 80) + (String(val).length > 80 ? '…' : '');
        html += `<td><div class="snip">${esc(val)}</div></td>`;
        return;
      }
      else if (c.type === 'pct-dec') {
        cls = 'td-num td-pct';
        const n = parseFloat(val);
        if (val !== '—' && val !== '' && !isNaN(n)) {
          val = (n * 100).toFixed(1) + '%';
        } else { val = '—'; }
      }
      else if (c.type === 'pct-raw') {
        cls = 'td-num td-pct';
        const n = parseFloat(val);
        if (val !== '—' && val !== '' && !isNaN(n)) {
          val = n.toFixed(1) + '%';
        } else { val = '—'; }
      }
      html += `<td class="${cls}">${esc(String(val))}</td>`;
    });

    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   SORT
   ═══════════════════════════════════════════════ */
function doSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  renderTable(current, data[current]);
}

/* ═══════════════════════════════════════════════
   DRAWER
   ═══════════════════════════════════════════════ */
function openDrawer(rowIdx, platform) {
  const row  = data[platform][rowIdx];
  const meta = PLATFORM_META[platform];
  const cols = COLS[platform];

  document.getElementById('drawerTag').innerHTML =
    `<i class="${meta.icon}" style="color:${meta.color}"></i> ${meta.label}`;

  const title   = row['post_title'] || 'Untitled';
  const imgRaw  = row['upload-img'] || '';
  const imgUrl  = driveThumb(imgRaw, 'w800');
  const overall = row['Overall'] || '';

  // Image block
  let imgHtml = '';
  if (imgUrl) {
    imgHtml = `
      <div class="d-img-wrap">
        <div class="d-img-loading" id="dil"><i class="fas fa-circle-notch"></i> Loading image…</div>
        <img class="d-img" src="${imgUrl}" alt="" style="display:none"
          onload="document.getElementById('dil').style.display='none';this.style.display='block'"
          onerror="imgErr('${esc(imgRaw)}')">
      </div>`;
  } else {
    imgHtml = `<div class="d-img-wrap"><div class="d-img-err"><i class="fas fa-image"></i>No image attached</div></div>`;
  }

  // Metrics — all cols for this platform
  let metricsHtml = '<div class="metrics-grid">';
  cols.forEach(c => {
    let val = row[c.key] ?? '—';
    if (c.type === 'pct-dec' && val !== '—' && val !== '' && !isNaN(parseFloat(val))) {
      val = (parseFloat(val) * 100).toFixed(2) + '%';
    } else if (c.type === 'pct-raw' && val !== '—' && val !== '' && !isNaN(parseFloat(val))) {
      val = parseFloat(val).toFixed(1) + '%';
    }
    const gold = c.type === 'num-hi';
    metricsHtml += `
      <div class="mp">
        <div class="mp-label">${esc(c.label)}</div>
        <div class="mp-val ${gold?'gold':''}">${esc(String(val))}</div>
      </div>`;
  });
  metricsHtml += '</div>';

  // Overall
  const overallHtml = overall ? `
    <div class="overall-box">
      <div class="overall-heading"><i class="fas fa-brain"></i> Overall Analysis</div>
      <div class="overall-text">${esc(overall)}</div>
    </div>` : '';

  const linkHtml = imgRaw
    ? `<div style="text-align:center;margin-top:14px">
         <a class="d-link" href="${esc(imgRaw)}" target="_blank" rel="noopener">
           <i class="fas fa-arrow-up-right-from-square"></i> Open image in Drive
         </a>
       </div>` : '';

  document.getElementById('drawerBody').innerHTML = `
    <div class="d-post-title">${esc(title)}</div>
    ${overallHtml}
    ${imgHtml}
    ${metricsHtml}
    ${linkHtml}
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function imgErr(link) {
  const el = document.getElementById('dil');
  if (!el) return;
  el.parentElement.innerHTML = `
    <div class="d-img-err">
      <i class="fas fa-triangle-exclamation"></i>
      Preview unavailable — share the Drive file publicly<br>
      ${link ? `<a class="d-link" href="${link}" target="_blank" rel="noopener"><i class="fas fa-arrow-up-right-from-square"></i> Open in Drive</a>` : ''}
    </div>`;
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrawer(); });

/* ═══════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════ */
function driveThumb(url, sz='w200') {
  if (!url) return '';
  const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  const id = m1?.[1] || m2?.[1] || '';
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=${sz}` : '';
}
function sumCol(rows, key) { return rows.reduce((a,r)=>a+(parseFloat(r[key])||0),0); }
function avgCol(rows, key) {
  const vals = rows.map(r=>parseFloat(r[key])).filter(v=>!isNaN(v));
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}
function fmt(n) {
  if (!n) return '0';
  if (n>=1000000) return (n/1000000).toFixed(1)+'M';
  if (n>=1000)    return (n/1000).toFixed(1)+'K';
  return Math.round(n).toLocaleString();
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Mirror scroll track sync ── */
function initScrollSync() {
  const wrap  = document.getElementById('tableWrap');
  const track = document.getElementById('scrollTrack');
  const inner = document.getElementById('scrollTrackInner');
  if (!wrap || !track || !inner) return;

  // Set inner width to match table's full scroll width
  const table = wrap.querySelector('table');
  if (table) inner.style.width = table.scrollWidth + 'px';
  else inner.style.width = '1px';

  // Two-way sync without loops
  let busy = false;
  track.addEventListener('scroll', () => {
    if (busy) return; busy = true;
    wrap.scrollLeft = track.scrollLeft;
    requestAnimationFrame(() => { busy = false; });
  });
  wrap.addEventListener('scroll', () => {
    if (busy) return; busy = true;
    track.scrollLeft = wrap.scrollLeft;
    requestAnimationFrame(() => { busy = false; });
  });
}

// Patch renderTable to call initScrollSync after every render
const _origRender = renderTable;
renderTable = function(...args) {
  _origRender.apply(this, args);
  requestAnimationFrame(initScrollSync);
};
</script>

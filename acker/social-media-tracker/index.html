<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xiaohongshu OCR → Text → Make.com</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tesseract.js CDN -->
  <script src="https://unpkg.com/tesseract.js@v5.1.0/dist/tesseract.min.js"></script>
  <style>
    body { background: linear-gradient(to bottom, #0f172a, #1e293b); color: #e2e8f0; min-height: 100vh; }
    .card { background: rgba(30,41,59,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(148,163,184,0.2); }
    .upload-zone { border: 2px dashed #64748b; transition: all 0.3s; }
    .upload-zone:hover, .upload-zone.dragover { border-color: #60a5fa; background: rgba(96,165,250,0.08); }
    .preview-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
    .preview-img { max-height: 180px; object-fit: contain; border-radius: 8px; }
    #progress { display: none; }
  </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6">

  <div class="w-full max-w-lg">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 mb-4 shadow-lg">
        <i class="fas fa-text text-3xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">Xiaohongshu OCR Extractor</h1>
      <p class="text-slate-400 mt-2">Upload screenshots → OCR text extraction → send clean text to Make.com</p>
    </div>

    <div class="card rounded-2xl p-6 sm:p-8 shadow-2xl">

      <form id="uploadForm" class="space-y-6">

        <!-- Channel -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Platform / Channel</label>
          <select id="channel" class="w-full bg-slate-800 border border-slate-600 text-white rounded-xl px-4 py-3">
            <option value="">Select…</option>
            <option value="Xiaohongshu">小红书</option>
            <option value="Douyin">抖音</option>
            <option value="Instagram">Instagram</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Type -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Type</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="relative flex flex-col items-center p-4 rounded-xl border border-slate-600 cursor-pointer has-[:checked]:border-blue-500">
              <input type="radio" name="type" value="performance" class="absolute opacity-0" checked>
              <div class="text-3xl mb-1">📈</div>
              <div>Post Performance</div>
            </label>
            <label class="relative flex flex-col items-center p-4 rounded-xl border border-slate-600 cursor-pointer has-[:checked]:border-blue-500">
              <input type="radio" name="type" value="leads" class="absolute opacity-0">
              <div class="text-3xl mb-1">👤</div>
              <div>New Lead</div>
            </label>
          </div>
        </div>

        <!-- Upload -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Screenshots</label>
          <div id="dropzone" class="upload-zone rounded-xl p-8 text-center cursor-pointer">
            <input type="file" id="fileInput" accept="image/*" multiple class="hidden"/>
            <div id="upload-content">
              <i class="fas fa-cloud-arrow-up text-5xl text-slate-500 mb-4"></i>
              <p class="text-slate-400">Click or drag images</p>
            </div>
            <div id="preview-container" class="preview-container"></div>
          </div>
        </div>

        <div id="progress" class="text-center text-yellow-400 hidden">OCR in progress... (may take 5–30 seconds)</div>

        <button id="submitBtn" type="submit"
          class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-medium py-4 rounded-xl flex items-center justify-center gap-3 text-lg">
          <i class="fas fa-file-lines"></i>
          Extract Text & Send to Make.com
        </button>

      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 opacity-0 pointer-events-none max-w-md w-full z-50">
    <i id="toast-icon" class="text-xl"></i>
    <span id="toast-text"></span>
  </div>

  <script>
    const WEBHOOK_URL = "https://hook.eu2.make.com/bi98gduy0wkripc5pwagnnmdfabf28on";
    let selectedFiles = [];

    const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const previewContainer = document.getElementById('preview-container');
    const submitBtn = document.getElementById('submitBtn');
    const progress = document.getElementById('progress');

    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    ['dragover', 'dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('dragover'); }));
    ['dragleave', 'drop'].forEach(ev => dropzone.addEventListener(ev, e => {
      e.preventDefault(); dropzone.classList.remove('dragover');
      if (e.type === 'drop') handleFiles(e.dataTransfer.files);
    }));

    function handleFiles(files) {
      selectedFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
      previewContainer.innerHTML = '';
      selectedFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'preview-img';
          previewContainer.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    }

    // OCR + send text
    async function extractAndSend() {
      if (selectedFiles.length === 0) return showToast('error', 'No images');

      submitBtn.disabled = true;
      progress.classList.remove('hidden');
      progress.textContent = 'OCR in progress... (5–30s)';

      let allText = `Platform: ${document.getElementById('channel').value}\nType: ${document.querySelector('input[name="type"]:checked').value}\n\n`;

      try {
        const worker = await Tesseract.createWorker(['chi_sim', 'eng'], 1, {
          logger: m => console.log(m),
        });

        for (let i = 0; i < selectedFiles.length; i++) {
          progress.textContent = `Processing image ${i+1}/${selectedFiles.length}...`;
          const { data: { text } } = await worker.recognize(selectedFiles[i]);
          allText += `--- Screenshot ${i+1} ---\n${text.trim()}\n\n`;
        }

        await worker.terminate();

        const blob = new Blob([allText], { type: 'text/plain' });
        const textFile = new File([blob], "xiaohongshu_ocr.txt", { type: "text/plain" });

        const formData = new FormData();
        formData.append('text_data', textFile);
        formData.append('type', document.querySelector('input[name="type"]:checked').value);
        formData.append('channel', document.getElementById('channel').value);

        const res = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
        if (res.ok) {
          showToast('success', `Text extracted & sent (${selectedFiles.length} images)`);
          document.getElementById('uploadForm').reset();
          previewContainer.innerHTML = '';
        } else {
          showToast('error', `Server error ${res.status}`);
        }
      } catch (err) {
        showToast('error', 'OCR failed');
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        progress.classList.add('hidden');
      }
    }

    document.getElementById('uploadForm').addEventListener('submit', e => {
      e.preventDefault();
      extractAndSend();
    });

    function showToast(type, msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-icon').className = type === 'success' ? 'fas fa-check-circle text-green-400' : 'fas fa-exclamation-circle text-red-400';
      document.getElementById('toast-text').textContent = msg;
      toast.classList.remove('opacity-0');
      setTimeout(() => toast.classList.add('opacity-0'), 4000);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Performance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background-color: #f6f8fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e1e4e8;
            padding: 16px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: #24292e;
        }
        .content {
            padding: 16px;
            flex: 1;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .form-label {
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            color: #24292e;
        }
        .form-check {
            margin-bottom: 8px;
        }
        .form-check-input {
            margin-top: 0.25em;
        }
        .form-check-label {
            color: #586069;
            font-size: 0.95rem;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .preview-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #e1e4e8;
        }
        #post-id {
            background-color: #f1f8ff;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            color: #0366d6;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .submit-button {
            background-color: #2ea44f;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.2s;
        }
        .submit-button:hover {
            background-color: #2c974b;
        }
        .footer {
            background-color: #f6f8fa;
            border-top: 1px solid #e1e4e8;
            padding: 12px;
            text-align: center;
            font-size: 0.85rem;
            color: #586069;
        }
        #status {
            margin-top: 16px;
            text-align: center;
            color: #0366d6;
        }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-upload me-2"></i>Performance Upload
    </div>
    <div class="content">
        <form id="uploadForm">
            <div id="post-id">
                Post ID: <span id="post-id-text"></span>
            </div>
            <div class="card">
                <label class="form-label">Select Channels</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="channels[]" value="Instagram" id="channel-ig">
                    <label class="form-check-label" for="channel-ig">Instagram</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="channels[]" value="Xiaohongshu" id="channel-xhs">
                    <label class="form-check-label" for="channel-xhs">Xiaohongshu (Little Red Book)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="channels[]" value="Facebook" id="channel-fb">
                    <label class="form-check-label" for="channel-fb">Facebook</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="channels[]" value="Douyin" id="channel-dy">
                    <label class="form-check-label" for="channel-dy">Douyin</label>
                </div>
            </div>
            <div class="card">
                <label for="images" class="form-label">Upload Screenshots</label>
                <input type="file" class="form-control" id="images" name="images[]" accept="image/*" multiple>
                <div id="image-preview" class="preview-grid"></div>
            </div>
            <input type="hidden" id="postId" name="post_id" value="">
            <button type="submit" class="submit-button">Submit</button>
        </form>
        <div id="status"></div>
    </div>
    <div class="footer">
        © 2026 Simple Upload
    </div>
    <script>
        const form = document.getElementById('uploadForm');
        const postIdInput = document.getElementById('postId');
        const postIdText = document.getElementById('post-id-text');
        const imageInput = document.getElementById('images');
        const imagePreview = document.getElementById('image-preview');
        const statusDiv = document.getElementById('status');
        function generatePostId() {
            const now = new Date();
            const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + '-' +
                            String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0');
            const random = Math.floor(1000 + Math.random() * 9000);
            return `POST-${dateStr}-${random}`;
        }
        const postId = generatePostId();
        postIdInput.value = postId;
        postIdText.textContent = postId;
        imageInput.addEventListener('change', function() {
            imagePreview.innerHTML = '';
            Array.from(this.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.classList.add('preview-img');
                    imagePreview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });
        async function compressImage(file, quality = 0.7, maxWidth = 1024, maxHeight = 1024) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name.replace(/\.[^/.]+$/, ".jpg"), { type: 'image/jpeg' }));
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            const channelsChecked = document.querySelectorAll('input[name="channels[]"]:checked');
            const channels = Array.from(channelsChecked).map(input => input.value);
            if (channels.length === 0) {
                alert('Please select at least one channel.');
                return;
            }
            if (imageInput.files.length === 0) {
                alert('Please upload at least one screenshot.');
                return;
            }
            statusDiv.textContent = 'Compressing images...';
            const compressedImages = await Promise.all(Array.from(imageInput.files).map(file => compressImage(file)));
            const formData = new FormData();
            formData.append('post_id', postId);
            channels.forEach(channel => formData.append('channels[]', channel));
            compressedImages.forEach(image => formData.append('images[]', image));
            statusDiv.textContent = 'Uploading...';
            fetch('https://hook.eu2.make.com/1m27xus1xn6m2v9g6huonlbaxlggq5ml', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    statusDiv.textContent = 'Upload successful!';
                    alert('Upload successful!');
                } else {
                    statusDiv.textContent = 'Upload failed.';
                    alert('Upload failed. Please try again.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                statusDiv.textContent = 'Upload failed.';
                alert('Upload failed. Please try again.');
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

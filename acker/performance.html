<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Performance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background-color: #f6f8fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e1e4e8;
            padding: 16px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: #24292e;
        }
        .content {
            padding: 16px;
            flex: 1;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .form-label {
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            color: #24292e;
        }
        .form-check {
            margin-bottom: 8px;
        }
        .form-check-input {
            margin-top: 0.25em;
        }
        .form-check-label {
            color: #586069;
            font-size: 0.95rem;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .preview-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #e1e4e8;
        }
        #post-id {
            background-color: #f1f8ff;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            color: #0366d6;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .submit-button {
            background-color: #2ea44f;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.2s;
        }
        .submit-button:hover {
            background-color: #2c974b;
        }
        .footer {
            background-color: #f6f8fa;
            border-top: 1px solid #e1e4e8;
            padding: 12px;
            text-align: center;
            font-size: 0.85rem;
            color: #586069;
        }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-upload me-2"></i>Performance Upload
    </div>
    <div class="content">
        <form id="uploadForm">
            <div id="post-id">
                Post ID: <span id="post-id-text"></span>
            </div>
            <div class="card">
                <label class="form-label">Select Channels</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="channels[]" value="Instagram" id="channel-ig">
                    <label class="form-check-label" for="channel-ig">Instagram</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="channels[]" value="Xiaohongshu" id="channel-xhs">
                    <label class="form-check-label" for="channel-xhs">Xiaohongshu (Little Red Book)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="channels[]" value="Facebook" id="channel-fb">
                    <label class="form-check-label" for="channel-fb">Facebook</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="channels[]" value="Douyin" id="channel-dy">
                    <label class="form-check-label" for="channel-dy">Douyin</label>
                </div>
            </div>
            <div class="card">
                <label for="images" class="form-label">Upload Screenshots</label>
                <input type="file" class="form-control" id="images" name="images[]" accept="image/*" multiple>
                <div id="image-preview" class="preview-grid"></div>
            </div>
            <input type="hidden" id="postId" name="post_id" value="">
            <button type="submit" class="submit-button">Submit to Google Drive</button>
            <div id="status" class="mt-3 text-center"></div>
        </form>
    </div>
    <div class="footer">
        © 2026 Simple Upload
    </div>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const CLIENT_ID = '124435785605-2lrhimp3e9lvbij5ihmlub53vuegq5e9.apps.googleusercontent.com';  // Your provided Client ID
        const API_KEY = '';  // Leave blank if not using, or add your API key from Google Cloud Console if needed
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const FOLDER_ID = '';  // Replace with your target Google Drive folder ID (optional, leave blank for root)

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: () => {},  // Defined dynamically
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                // Ready
            }
        }

        // Load APIs
        gapiLoaded();
        // gisLoaded() is called by the script src

        const form = document.getElementById('uploadForm');
        const postIdInput = document.getElementById('postId');
        const postIdText = document.getElementById('post-id-text');
        const imageInput = document.getElementById('images');
        const imagePreview = document.getElementById('image-preview');
        const statusDiv = document.getElementById('status');

        function generatePostId() {
            const now = new Date();
            const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + '-' +
                            String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0');
            const random = Math.floor(1000 + Math.random() * 9000);
            return `POST-${dateStr}-${random}`;
        }

        const postId = generatePostId();
        postIdInput.value = postId;
        postIdText.textContent = postId;

        imageInput.addEventListener('change', function() {
            imagePreview.innerHTML = '';
            Array.from(this.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.classList.add('preview-img');
                    imagePreview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        function b64toBlob(b64Data, contentType) {
            contentType = contentType || '';
            const sliceSize = 512;
            const byteCharacters = atob(b64Data);
            const byteArrays = [];
            for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
                const slice = byteCharacters.slice(offset, offset + sliceSize);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) {
                    byteNumbers[i] = slice.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                byteArrays.push(byteArray);
            }
            return new Blob(byteArrays, {type: contentType});
        }

        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            const channelsChecked = document.querySelectorAll('input[name="channels[]"]:checked');
            const channels = Array.from(channelsChecked).map(input => input.value);
            if (channels.length === 0) {
                alert('Please select at least one channel.');
                return;
            }
            if (imageInput.files.length === 0) {
                alert('Please upload at least one screenshot.');
                return;
            }

            // Convert images to base64 first
            const imagesBase64 = await Promise.all(Array.from(imageInput.files).map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve({
                        filename: file.name,
                        contentType: file.type,
                        data: reader.result.split(',')[1]  // Pure base64
                    });
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }));

            statusDiv.textContent = 'Authenticating...';

            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                statusDiv.textContent = 'Uploading...';
                await uploadFiles(imagesBase64, channels);
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        });

        async function uploadFiles(imagesBase64, channels) {
            try {
                for (const img of imagesBase64) {
                    const blob = b64toBlob(img.data, img.contentType);
                    const metadata = {
                        name: `${postId} - ${channels.join(', ')} - ${img.filename}`,
                        mimeType: img.contentType,
                    };
                    if (FOLDER_ID) {
                        metadata.parents = [FOLDER_ID];
                    }

                    const formData = new FormData();
                    formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
                    formData.append('file', blob);

                    const accessToken = gapi.client.getToken().access_token;
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
                    xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            console.log('Uploaded:', JSON.parse(xhr.responseText));
                        } else {
                            console.error('Error:', xhr.responseText);
                        }
                    };
                    xhr.send(formData);
                }
                statusDiv.textContent = 'Upload complete! Check your Google Drive.';
            } catch (err) {
                statusDiv.textContent = 'Error: ' + err.message;
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

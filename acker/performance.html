<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            color: #1f2937;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
            width: 100%;
            max-width: 560px;
            overflow: hidden;
            border: 1px solid #f3f4f6;
        }
        .header {
            background: #ffffff;
            color: #ff6600;
            padding: 32px 28px;
            text-align: center;
            border-bottom: 1px solid #f3f4f6;
        }
        .header img {
            height: 58px;
            margin-bottom: 16px;
        }
        .header h1 { font-size: 1.85rem; font-weight: 700; }
        .header p { font-size: 1rem; color: #6b7280; margin-top: 8px; }
        .content { padding: 32px; }
        .form-group { margin-bottom: 24px; position: relative; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111827;
        }
        input[type=text], select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all .3s ease;
        }
        input[type=text]:focus, select:focus {
            outline: none;
            border-color: #ff8533;
            box-shadow: 0 0 0 3px rgba(255,102,0,.15);
        }
        .upload-area {
            border: 3px dashed #ff8533;
            border-radius: 18px;
            padding: 45px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fffaf0;
        }
        .upload-area:hover { border-color: #ff6600; background: #fff5e6; }
        .upload-area.dragover { border-color: #ff6600; background: #ffedd5; }
        .upload-area i { font-size: 50px; color: #ff6600; margin-bottom: 14px; display: block; }
        .upload-area input { display: none; }
        .preview-box { margin: 22px 0; text-align: center; }
        .preview-box p { font-weight: 600; margin-bottom: 10px; color: #1f2937; }
        .preview-box img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 14px;
            box-shadow: 0 6px 16px rgba(0,0,0,.1);
            border: 1px solid #f3f4f6;
        }
        .info {
            background: #fff7ed;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.94rem;
            color: #9a3412;
            margin: 18px 0;
            border-left: 4px solid #ff6600;
        }
        .upload-tip {
            font-size: 0.9rem;
            color: #6b7280;
            text-align: center;
            margin: 10px 0;
            font-style: italic;
        }
        .btn {
            background: #ff6600;
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: .3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover { background: #e65c00; transform: translateY(-1px); }
        .btn:disabled { background: #fb923c; cursor: not-allowed; }
        .loader {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
        .channel-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .channel-label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all .3s ease;
        }
        .channel-label input {
            display: none;
        }
        .channel-label.selected {
            border-color: #ff8533;
            background: #fff5e6;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>Performance Upload</h1>
        <p>Upload screenshots for selected channels • Auto compress & base64</p>
    </div>
    <div class="content">
        <form id="uploadForm">
            <div class="form-group">
                <label>Post ID</label>
                <input type="text" id="post-id-text" readonly>
            </div>
            <div class="form-group">
                <label>Select Channels</label>
                <div class="channel-group">
                    <label class="channel-label" for="channel-ig">
                        <input type="checkbox" name="channels[]" value="Instagram" id="channel-ig">
                        Instagram
                    </label>
                    <label class="channel-label" for="channel-xhs">
                        <input type="checkbox" name="channels[]" value="Xiaohongshu" id="channel-xhs">
                        Xiaohongshu
                    </label>
                    <label class="channel-label" for="channel-fb">
                        <input type="checkbox" name="channels[]" value="Facebook" id="channel-fb">
                        Facebook
                    </label>
                    <label class="channel-label" for="channel-dy">
                        <input type="checkbox" name="channels[]" value="Douyin" id="channel-dy">
                        Douyin
                    </label>
                </div>
            </div>
            <div class="upload-area" id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p><strong>Click or drag & drop</strong> screenshots</p>
                <p style="font-size:0.85rem;color:#9ca3af;margin-top:6px;">JPG, PNG – multiple allowed</p>
                <input type="file" id="images" name="images[]" accept="image/*" multiple>
            </div>
            <p class="upload-tip">Tip: Upload high-quality screenshots for best results.</p>
            <div id="status" class="info hidden"></div>
            <div class="preview-box hidden" id="previewBox">
                <p>Previews</p>
                <div id="image-preview" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
            </div>
            <input type="hidden" id="postId" name="post_id" value="">
            <button type="submit" class="btn hidden" id="submitBtn">
                <span class="loader hidden" id="loader"></span>
                <span id="btnText">Submit</span>
            </button>
        </form>
    </div>
</div>
<script>
    const form = document.getElementById('uploadForm');
    const postIdInput = document.getElementById('postId');
    const postIdText = document.getElementById('post-id-text');
    const dropZone = document.getElementById('dropZone');
    const imageInput = document.getElementById('images');
    const imagePreview = document.getElementById('image-preview');
    const previewBox = document.getElementById('previewBox');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');
    const channelLabels = document.querySelectorAll('.channel-label');

    function generatePostId() {
        const now = new Date();
        const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + '-' +
                        String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0');
        const random = Math.floor(1000 + Math.random() * 9000);
        return `POST-${dateStr}-${random}`;
    }

    const postId = generatePostId();
    postIdInput.value = postId;
    postIdText.value = postId;

    channelLabels.forEach(label => {
        label.addEventListener('click', () => {
            const input = label.querySelector('input');
            input.checked = !input.checked;
            label.classList.toggle('selected', input.checked);
        });
    });

    ['dragenter','dragover','dragleave','drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }, false));
    ['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('dragover'), false));
    ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('dragover'), false));
    dropZone.addEventListener('drop', e => {
        const files = e.dataTransfer.files;
        imageInput.files = files;
        handleFiles(files);
    });
    dropZone.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', () => handleFiles(imageInput.files));

    function handleFiles(files) {
        imagePreview.innerHTML = '';
        previewBox.classList.add('hidden');
        submitBtn.classList.add('hidden');
        if (files.length > 0) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.maxWidth = '100px';
                    img.style.maxHeight = '100px';
                    img.style.borderRadius = '8px';
                    imagePreview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
            previewBox.classList.remove('hidden');
            submitBtn.classList.remove('hidden');
        }
    }

    async function compressImage(file, quality = 0.7, maxWidth = 1024, maxHeight = 1024) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        const compressedReader = new FileReader();
                        compressedReader.onload = () => {
                            resolve({
                                filename: file.name.replace(/\.[^/.]+$/, ".jpg"),
                                contentType: 'image/jpeg',
                                data: compressedReader.result.split(',')[1] // Pure base64 data
                            });
                        };
                        compressedReader.onerror = reject;
                        compressedReader.readAsDataURL(blob);
                    }, 'image/jpeg', quality);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    form.addEventListener('submit', async function(event) {
        event.preventDefault();
        const channelsChecked = document.querySelectorAll('input[name="channels[]"]:checked');
        const channels = Array.from(channelsChecked).map(input => input.value);
        if (channels.length === 0) {
            showStatus('Please select at least one channel.', 'error');
            return;
        }
        if (imageInput.files.length === 0) {
            showStatus('Please upload at least one screenshot.', 'error');
            return;
        }
        toggleLoader(true);
        showStatus('Compressing images...', 'info');
        const imagesBase64 = await Promise.all(Array.from(imageInput.files).map(file => compressImage(file)));
        const payload = {
            post_id: postId,
            channels: channels,
            images: imagesBase64
        };
        showStatus('Uploading...', 'info');
        fetch('https://hook.eu2.make.com/1m27xus1xn6m2v9g6huonlbaxlggq5ml', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                showStatus('Upload successful!', 'success');
                btnText.textContent = 'Submitted';
            } else {
                showStatus('Upload failed.', 'error');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showStatus('Upload failed.', 'error');
        })
        .finally(() => {
            toggleLoader(false);
        });
    });

    function showStatus(msg, type = 'info') {
        statusDiv.innerHTML = msg;
        statusDiv.className = 'info';
        if (type === 'error') { statusDiv.style.background = '#fee2e2'; statusDiv.style.color = '#991b1b'; statusDiv.style.borderLeftColor = '#ef4444'; }
        if (type === 'success') { statusDiv.style.background = '#f0fdf4'; statusDiv.style.color = '#166534'; statusDiv.style.borderLeftColor = '#22c55e'; }
        statusDiv.classList.remove('hidden');
    }

    function toggleLoader(show) {
        loader.classList.toggle('hidden', !show);
        submitBtn.disabled = show;
        btnText.textContent = show ? 'Processing...' : 'Submit';
    }
</script>
</body>
</html>
